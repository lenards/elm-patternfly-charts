<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PF v6 Charts · elm-charts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@300;400;600&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Red Hat Text', Helvetica, Arial, sans-serif;
      background: #f2f2f2;
    }
    /* PatternFly axis/tick styling — applied via SVG style inheritance */
    .pf-axis line, .pf-axis path {
      stroke: #c7c7c7;
    }
    .pf-axis text {
      fill: #383838;
      font-size: 12px;
      font-family: 'Red Hat Text', Helvetica, Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div id="elm-app"></div>
  <script src="/experiments-elm-charts/elm-charts.js"></script>
  <script>
    var app = Elm.Main.init({ node: document.getElementById('elm-app') });
  </script>
</body>
</html>
